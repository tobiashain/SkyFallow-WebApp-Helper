<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <title>NPC schedule pipeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: npc_nav_baked.json (input) -->
  <rect x="20" y="30" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="55" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">npc_nav_baked.json</text>
  <text x="100" y="72" text-anchor="middle" font-size="11" fill="#5F5E5A">nav data source</text>

  <!-- Arrow → ScheduleWebApp -->
  <line x1="180" y1="58" x2="206" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: ScheduleWebApp -->
  <rect x="210" y="30" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="55" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">ScheduleWebApp</text>
  <text x="290" y="72" text-anchor="middle" font-size="11" fill="#534AB7">designer UI</text>

  <!-- Arrow → npc_schedules.json -->
  <line x1="370" y1="58" x2="396" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: npc_schedules.json -->
  <rect x="400" y="30" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="480" y="55" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">npc_schedules.json</text>
  <text x="480" y="72" text-anchor="middle" font-size="11" fill="#5F5E5A">placed in res://data/</text>

  <!-- Arrow ↓ to create script -->
  <line x1="480" y1="86" x2="480" y2="126" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: create_npc_schedules.gd -->
  <rect x="400" y="130" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="152" text-anchor="middle" font-size="12" font-weight="500" fill="#04342C">create_npc_schedules.gd</text>
  <text x="480" y="169" text-anchor="middle" font-size="11" fill="#0F6E56">editor script</text>

  <!-- Arrow ← to schedule resources -->
  <line x1="400" y1="158" x2="374" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Schedule resources → NPCs -->
  <rect x="210" y="130" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="290" y="152" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Schedule resources</text>
  <text x="290" y="169" text-anchor="middle" font-size="11" fill="#854F0B">assigned to NPCs</text>

  <!-- Arrow ← to bake script -->
  <line x1="210" y1="158" x2="184" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: bake_npc_nav_data.gd -->
  <rect x="20" y="130" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="100" y="152" text-anchor="middle" font-size="12" font-weight="500" fill="#04342C">bake_npc_nav_data.gd</text>
  <text x="100" y="169" text-anchor="middle" font-size="11" fill="#0F6E56">editor script</text>

  <!-- Arrow ↓ to baked output -->
  <line x1="100" y1="186" x2="100" y2="226" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7: npc_nav_baked.json (output) -->
  <rect x="20" y="230" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="252" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">npc_nav_baked.json</text>
  <text x="100" y="269" text-anchor="middle" font-size="11" fill="#5F5E5A">baked output</text>

  <!-- Arrow → Game Runtime -->
  <line x1="180" y1="258" x2="206" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 8: Game Runtime -->
  <rect x="210" y="230" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="262" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">Game runtime</text>

  <!-- Loop-back dashed arrow -->
  <path d="M370 258 L580 258 L580 58 L562 58" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="596" y="162" text-anchor="middle" font-size="10" fill="#888780" transform="rotate(-90 596 162)">loop: re-import to refine</text>
</svg>
